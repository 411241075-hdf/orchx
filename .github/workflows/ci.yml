name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Только последний run на ветку, остальные отменяем.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dev deps
        run: pip install -e ".[dev,test]"
      - name: ruff check
        run: ruff check src/
      - name: ruff format check
        run: ruff format --check src/

  typecheck:
    name: Type-check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dev deps
        run: pip install -e ".[dev,test]"
      # NB: strict=false (см. pyproject [tool.mypy]); поэтапная миграция к strict — P3.
      - name: mypy
        run: mypy src/orchx
        continue-on-error: true  # пока non-blocking, чтобы CI не падал на каждый missing-type

  test:
    name: Test (py${{ matrix.python }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install deps
        run: pip install -e ".[test]"
      - name: Configure git for tests
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
          git config --global init.defaultBranch main
      - name: Run tests with coverage
        run: pytest --cov=orchx --cov-report=xml --cov-report=term
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
        continue-on-error: true

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build
        run: pip install build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Check distribution
        run: twine check dist/*
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
